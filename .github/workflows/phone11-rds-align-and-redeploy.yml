name: Phone11 RDS Align and Backend Redeploy

on:
  workflow_dispatch:
  push:
    branches:
      - codex/phone11-mobile-pjsip-20260506
    paths:
      - '.github/workflows/phone11-rds-align-and-redeploy.yml'
      - 'server/_core/.phone11-rds-align-trigger-*'
      - 'ops/scripts/redeploy-mobile-branch.sh'

concurrency:
  group: phone11-rds-align-and-redeploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'ap-southeast-7' }}
  EC2_HOST: '43.209.112.208'
  EC2_USER: 'ubuntu'
  DEPLOY_CHECKOUT: '/opt/phone11ai/codex-phone11-deploy'
  PILOT_USER_ID: '1'
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

permissions:
  contents: write

jobs:
  align-and-redeploy:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      - name: Locate EC2 instance through AWS
        id: ec2
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo "ERROR: AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY must be configured."
            exit 30
          fi
          INSTANCE_JSON=$(aws ec2 describe-instances --filters "Name=ip-address,Values=$EC2_HOST" "Name=instance-state-name,Values=running" --query 'Reservations[0].Instances[0]' --output json)
          INSTANCE_ID=$(echo "$INSTANCE_JSON" | jq -r '.InstanceId // empty')
          AZ=$(echo "$INSTANCE_JSON" | jq -r '.Placement.AvailabilityZone // empty')
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "null" ]; then
            echo "ERROR: Could not find a running EC2 instance with public IP $EC2_HOST"
            exit 31
          fi
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "az=$AZ" >> "$GITHUB_OUTPUT"
          echo "Found EC2 instance $INSTANCE_ID in $AZ"

      - name: Prepare temporary SSH key
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keygen -t ed25519 -N '' -f ~/.ssh/phone11_temp_eic_key -C phone11-github-actions

      - name: Read backend DB config from EC2
        id: db
        shell: bash
        run: |
          set -euo pipefail
          INSTANCE_ID='${{ steps.ec2.outputs.instance_id }}'
          AZ='${{ steps.ec2.outputs.az }}'
          aws ec2-instance-connect send-ssh-public-key --instance-id "$INSTANCE_ID" --availability-zone "$AZ" --instance-os-user "$EC2_USER" --ssh-public-key "file://$HOME/.ssh/phone11_temp_eic_key.pub"
          REMOTE_ENV=$(ssh -i ~/.ssh/phone11_temp_eic_key -o StrictHostKeyChecking=no "$EC2_USER@$EC2_HOST" 'for candidate in "/opt/phone11ai/codex-phone11-deploy/.env" "/opt/phone11ai/phone11ai/deploy/backend/.env" "/opt/phone11ai/cloudphone11/infra/compose/.env" "/opt/phone11ai/cloudphone11/.env" "/opt/phone11ai/.env" "/home/ubuntu/phone11ai/.env" "/home/ubuntu/cloudphone11/.env" "/home/ubuntu/codex-phone11/.env"; do if [ -f "$candidate" ]; then echo "ENV_FILE=$candidate"; awk -F= '\''/^(PG_HOST|DB_HOST|POSTGRES_HOST|PG_DATABASE|DB_NAME|DB_DATABASE|POSTGRES_DB|PG_USER|DB_USER|POSTGRES_USER|PG_PASSWORD|DB_PASSWORD|POSTGRES_PASSWORD)=/ {print $1"="$2}'\'' "$candidate"; exit 0; fi; done' 2>/tmp/phone11-remote-env-error.log)
          DB_HOST=$(printf '%s\n' "$REMOTE_ENV" | awk -F= '/^(PG_HOST|DB_HOST|POSTGRES_HOST)=/ {print $2; exit}' | tr -d '\r' | sed -E 's/^["'"'"']//; s/["'"'"']$//')
          DB_NAME=$(printf '%s\n' "$REMOTE_ENV" | awk -F= '/^(PG_DATABASE|DB_NAME|DB_DATABASE|POSTGRES_DB)=/ {print $2; exit}' | tr -d '\r' | sed -E 's/^["'"'"']//; s/["'"'"']$//')
          DB_USER=$(printf '%s\n' "$REMOTE_ENV" | awk -F= '/^(PG_USER|DB_USER|POSTGRES_USER)=/ {print $2; exit}' | tr -d '\r' | sed -E 's/^["'"'"']//; s/["'"'"']$//')
          DB_PASSWORD=$(printf '%s\n' "$REMOTE_ENV" | awk -F= '/^(PG_PASSWORD|DB_PASSWORD|POSTGRES_PASSWORD)=/ {print $2; exit}' | tr -d '\r' | sed -E 's/^["'"'"']//; s/["'"'"']$//')
          DB_REGION=$(printf '%s' "$DB_HOST" | sed -nE 's/.*\.([a-z]{2}-[a-z-]+-[0-9]+)\.rds\.amazonaws\.com.*/\1/p')
          ENV_FILE=$(printf '%s\n' "$REMOTE_ENV" | awk -F= '/^ENV_FILE=/ {print $2; exit}' | tr -d '\r')
          if [ -z "$DB_HOST" ] || [ -z "$DB_NAME" ] || [ -z "$DB_USER" ] || [ -z "$DB_PASSWORD" ] || [ -z "$DB_REGION" ]; then
            echo "ERROR: Missing DB config from backend .env."
            printf '%s\n' "$REMOTE_ENV" | sed -E 's/(PG_PASSWORD|DB_PASSWORD|POSTGRES_PASSWORD)=.*/\1=<redacted>/g; s/(PG_USER|DB_USER|POSTGRES_USER)=.*/\1=<db-user>/g'
            exit 40
          fi
          echo "::add-mask::$DB_PASSWORD"
          echo "db_host=$DB_HOST" >> "$GITHUB_OUTPUT"
          echo "db_region=$DB_REGION" >> "$GITHUB_OUTPUT"
          echo "db_name=$DB_NAME" >> "$GITHUB_OUTPUT"
          echo "db_user=$DB_USER" >> "$GITHUB_OUTPUT"
          echo "env_file=$ENV_FILE" >> "$GITHUB_OUTPUT"
          printf 'DB_PASSWORD=%s\n' "$DB_PASSWORD" > /tmp/phone11-db-password.env
          chmod 600 /tmp/phone11-db-password.env
          echo "Backend DB config loaded from ${ENV_FILE:-unknown env path}; password is masked."

      - name: Align RDS master password to backend env
        id: rds
        shell: bash
        run: |
          set -euo pipefail
          source /tmp/phone11-db-password.env
          echo "::add-mask::$DB_PASSWORD"
          DB_HOST='${{ steps.db.outputs.db_host }}'
          DB_REGION='${{ steps.db.outputs.db_region }}'
          DB_USER='${{ steps.db.outputs.db_user }}'
          DB_INSTANCE_ID=$(aws rds describe-db-instances --region "$DB_REGION" --query "DBInstances[?Endpoint.Address=='$DB_HOST'].DBInstanceIdentifier | [0]" --output text)
          MASTER_USERNAME=$(aws rds describe-db-instances --region "$DB_REGION" --db-instance-identifier "$DB_INSTANCE_ID" --query 'DBInstances[0].MasterUsername' --output text)
          if [ -z "$DB_INSTANCE_ID" ] || [ "$DB_INSTANCE_ID" = "None" ]; then
            echo "ERROR: RDS instance not found for backend DB host $DB_HOST"
            exit 41
          fi
          if [ "$MASTER_USERNAME" != "$DB_USER" ]; then
            echo "ERROR: RDS master username ($MASTER_USERNAME) does not match backend DB user ($DB_USER). Refusing automatic password reset."
            exit 42
          fi
          echo "Aligning password for RDS instance $DB_INSTANCE_ID in $DB_REGION; password is masked."
          aws rds modify-db-instance --region "$DB_REGION" --db-instance-identifier "$DB_INSTANCE_ID" --master-user-password "$DB_PASSWORD" --apply-immediately >/tmp/phone11-rds-modify.json
          echo "Waiting for RDS instance to become available after password alignment."
          aws rds wait db-instance-available --region "$DB_REGION" --db-instance-identifier "$DB_INSTANCE_ID"
          echo "RDS password alignment completed."
          echo "db_instance_id=$DB_INSTANCE_ID" >> "$GITHUB_OUTPUT"

      - name: Redeploy backend through EC2 Instance Connect
        id: deploy
        continue-on-error: true
        shell: bash
        run: |
          set +e
          INSTANCE_ID='${{ steps.ec2.outputs.instance_id }}'
          AZ='${{ steps.ec2.outputs.az }}'
          aws ec2-instance-connect send-ssh-public-key --instance-id "$INSTANCE_ID" --availability-zone "$AZ" --instance-os-user "$EC2_USER" --ssh-public-key "file://$HOME/.ssh/phone11_temp_eic_key.pub"
          scp -i ~/.ssh/phone11_temp_eic_key -o StrictHostKeyChecking=no ops/scripts/redeploy-mobile-branch.sh "$EC2_USER@$EC2_HOST:/tmp/phone11-redeploy-mobile-branch.sh"
          ssh -i ~/.ssh/phone11_temp_eic_key -o StrictHostKeyChecking=no "$EC2_USER@$EC2_HOST" "AWS_DEFAULT_REGION='$AWS_DEFAULT_REGION' GITHUB_SHA='$GITHUB_SHA' DEPLOY_CHECKOUT='$DEPLOY_CHECKOUT' PILOT_USER_ID='$PILOT_USER_ID' bash /tmp/phone11-redeploy-mobile-branch.sh" 2>&1 | tee /tmp/phone11-rds-align-redeploy-output.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit sanitized repair status
        if: always()
        shell: bash
        run: |
          git fetch origin "$GITHUB_REF_NAME"
          git pull --rebase origin "$GITHUB_REF_NAME"
          mkdir -p ops
          status='${{ steps.deploy.outputs.status }}'
          if [ -z "$status" ]; then status=99; fi
          result="success"
          if [ "$status" != "0" ]; then result="failure"; fi
          {
            echo "# Phone11 RDS Align and Redeploy Status"
            echo ""
            echo "- Time UTC: $(date -u -Iseconds)"
            echo "- Branch: $GITHUB_REF_NAME"
            echo "- Workflow commit: $GITHUB_SHA"
            echo "- EC2 host: $EC2_HOST"
            echo "- RDS instance: ${{ steps.rds.outputs.db_instance_id }}"
            echo "- Runtime DB host: ${{ steps.db.outputs.db_host }}"
            echo "- Runtime DB region: ${{ steps.db.outputs.db_region }}"
            echo "- Runtime DB name: ${{ steps.db.outputs.db_name }}"
            echo "- Runtime DB user: <db-user>"
            echo "- Runtime env file: ${{ steps.db.outputs.env_file }}"
            echo "- Result: $result"
            echo "- Exit code: $status"
            echo ""
            echo "## Sanitized output"
            echo '```text'
            sed -E 's#(postgres://)[^:@/]+:[^@]+@#\1<redacted>:<redacted>@#g; s#(password authentication failed for user )"[^"]+"#\1"<db-user>"#g; s#(PGPASSWORD|DB_PASSWORD|AWS_SECRET_ACCESS_KEY|AWS_ACCESS_KEY_ID)=([^[:space:]]+)#\1=<redacted>#g; s#(password|secret)[^[:space:]]*#<redacted>#Ig' /tmp/phone11-rds-align-redeploy-output.log 2>/dev/null || true
            echo '```'
          } > ops/phone11-rds-align-redeploy-status.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ops/phone11-rds-align-redeploy-status.md
          if git diff --cached --quiet; then
            echo "No status file changes to commit."
          else
            git commit -m "Update Phone11 RDS align redeploy status"
            git push
          fi

      - name: Fail if backend repair failed
        if: always()
        shell: bash
        run: |
          status='${{ steps.deploy.outputs.status }}'
          if [ -z "$status" ]; then status=99; fi
          exit "$status"
