name: Phone11 Clean Backend Redeploy

on:
  workflow_dispatch:
  push:
    branches:
      - codex/phone11-mobile-pjsip-20260506
    paths:
      - '.github/workflows/phone11-clean-and-redeploy.yml'
      - 'server/_core/.phone11-clean-redeploy-trigger-*'
      - 'ops/scripts/redeploy-mobile-branch.sh'

concurrency:
  group: phone11-clean-backend-redeploy-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'ap-southeast-7' }}
  EC2_HOST: '43.209.112.208'
  EC2_USER: 'ubuntu'
  DEPLOY_CHECKOUT: '/opt/phone11ai/codex-phone11-deploy'
  PILOT_USER_ID: '1'
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

permissions:
  contents: write

jobs:
  clean-and-redeploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Clean EC2 Docker cache and redeploy backend
        shell: bash
        run: |
          set +e
          LOG=/tmp/phone11-clean-redeploy.log
          STATUS=0
          INSTANCE_ID=''
          AZ=''
          exec > >(tee "$LOG") 2>&1

          sanitize_log() {
            sed -E 's#(PGPASSWORD|DB_PASSWORD|POSTGRES_PASSWORD|AWS_SECRET_ACCESS_KEY|AWS_ACCESS_KEY_ID)=([^[:space:]]+)#\1=<redacted>#g; s#(password|secret)[^[:space:]]*#<redacted>#Ig' "$LOG" 2>/dev/null || true
          }

          finish() {
            local result='success'
            if [ "$STATUS" != '0' ]; then result='failure'; fi
            git fetch origin "$GITHUB_REF_NAME" >/dev/null 2>&1 || true
            git pull --rebase origin "$GITHUB_REF_NAME" >/dev/null 2>&1 || true
            mkdir -p ops
            {
              echo '# Phone11 Clean Backend Redeploy Status'
              echo ''
              echo "- Time UTC: $(date -u -Iseconds)"
              echo "- Branch: $GITHUB_REF_NAME"
              echo "- Workflow commit: $GITHUB_SHA"
              echo "- EC2 host: $EC2_HOST"
              echo "- EC2 instance: ${INSTANCE_ID:-not-set}"
              echo "- Result: $result"
              echo "- Exit code: $STATUS"
              echo ''
              echo '## Sanitized output'
              echo '```text'
              sanitize_log
              echo '```'
            } > ops/phone11-clean-redeploy-status.md
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add ops/phone11-clean-redeploy-status.md
            if git diff --cached --quiet; then
              echo 'No status file changes to commit.'
            else
              git commit -m "Update Phone11 clean redeploy status"
              git push
            fi
            exit "$STATUS"
          }
          trap finish EXIT

          echo '=== Phone11 clean backend redeploy ==='
          echo "Time: $(date -u -Iseconds)"
          if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo 'ERROR: AWS credentials are not configured.'
            STATUS=30
            exit 30
          fi

          echo '--- Locating EC2 instance ---'
          INSTANCE_JSON=$(aws ec2 describe-instances --filters "Name=ip-address,Values=$EC2_HOST" "Name=instance-state-name,Values=running" --query 'Reservations[0].Instances[0]' --output json)
          if [ $? -ne 0 ]; then STATUS=31; exit 31; fi
          INSTANCE_ID=$(echo "$INSTANCE_JSON" | jq -r '.InstanceId // empty')
          AZ=$(echo "$INSTANCE_JSON" | jq -r '.Placement.AvailabilityZone // empty')
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = 'null' ]; then
            echo "ERROR: Could not find running EC2 instance for $EC2_HOST"
            STATUS=32
            exit 32
          fi
          echo "Found EC2 instance $INSTANCE_ID in $AZ"

          echo '--- Preparing temporary SSH access ---'
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keygen -t ed25519 -N '' -f ~/.ssh/phone11_temp_eic_key -C phone11-github-actions >/dev/null 2>&1
          aws ec2-instance-connect send-ssh-public-key --instance-id "$INSTANCE_ID" --availability-zone "$AZ" --instance-os-user "$EC2_USER" --ssh-public-key "file://$HOME/.ssh/phone11_temp_eic_key.pub"
          if [ $? -ne 0 ]; then STATUS=33; exit 33; fi

          echo '--- Cleaning EC2 Docker cache before rebuild ---'
          ssh -i ~/.ssh/phone11_temp_eic_key -o StrictHostKeyChecking=no "$EC2_USER@$EC2_HOST" 'set +e
            echo "Disk before cleanup:"; df -h / /var/lib/docker 2>/dev/null || df -h
            docker system df || true
            docker ps -a --filter "name=cp11-backend" --format "{{.ID}} {{.Names}} {{.Status}}" || true
            docker builder prune -af || true
            docker container prune -f || true
            docker image prune -af || true
            docker system prune -af || true
            sudo journalctl --vacuum-size=300M || true
            sudo rm -rf /tmp/phone11-* /tmp/tmp.* 2>/dev/null || true
            echo "Disk after cleanup:"; df -h / /var/lib/docker 2>/dev/null || df -h
            docker system df || true
          '
          if [ $? -ne 0 ]; then STATUS=34; exit 34; fi

          echo '--- Redeploying backend and verifying pilot extension ---'
          aws ec2-instance-connect send-ssh-public-key --instance-id "$INSTANCE_ID" --availability-zone "$AZ" --instance-os-user "$EC2_USER" --ssh-public-key "file://$HOME/.ssh/phone11_temp_eic_key.pub" >/dev/null
          scp -i ~/.ssh/phone11_temp_eic_key -o StrictHostKeyChecking=no ops/scripts/redeploy-mobile-branch.sh "$EC2_USER@$EC2_HOST:/tmp/phone11-redeploy-mobile-branch.sh"
          ssh -i ~/.ssh/phone11_temp_eic_key -o StrictHostKeyChecking=no "$EC2_USER@$EC2_HOST" "AWS_DEFAULT_REGION='$AWS_DEFAULT_REGION' GITHUB_SHA='$GITHUB_SHA' DEPLOY_CHECKOUT='$DEPLOY_CHECKOUT' PILOT_USER_ID='$PILOT_USER_ID' bash /tmp/phone11-redeploy-mobile-branch.sh"
          STATUS=$?
          if [ "$STATUS" = '0' ]; then
            echo 'Backend clean redeploy and pilot verification succeeded.'
          else
            echo "ERROR: Backend clean redeploy failed with status $STATUS."
          fi
