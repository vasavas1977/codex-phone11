name: Test & Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm check
        continue-on-error: true

      - name: Lint
        run: pnpm lint
        continue-on-error: true

      - name: Run tests
        run: pnpm test

      - name: Test summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ✅ Passed |" >> $GITHUB_STEP_SUMMARY

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7'

      - name: Terraform fmt check
        run: terraform fmt -check -recursive
        working-directory: infra/terraform
        continue-on-error: true

      - name: Terraform init
        run: terraform init -backend=false
        working-directory: infra/terraform

      - name: Terraform validate
        run: terraform validate
        working-directory: infra/terraform

  docker-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Dockerfiles
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: infra/docker/freeswitch/Dockerfile
        continue-on-error: true

      - name: Lint Kamailio Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: infra/docker/kamailio/Dockerfile
        continue-on-error: true

      - name: Lint Flexisip Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: infra/docker/flexisip/Dockerfile
        continue-on-error: true

      - name: Lint Backend Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: infra/docker/backend/Dockerfile
        continue-on-error: true
