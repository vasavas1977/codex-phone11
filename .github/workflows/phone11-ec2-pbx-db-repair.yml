name: Phone11 EC2 PBX DB Repair

on:
  workflow_dispatch:
    inputs:
      ec2_host:
        description: 'EC2 public IP or DNS'
        required: true
        default: '43.210.122.111'
      ec2_user:
        description: 'SSH/Linux user'
        required: true
        default: 'ubuntu'
      project_path:
        description: 'Current live Phone11 path on EC2'
        required: true
        default: '/opt/phone11ai/cloudphone11'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/phone11-ec2-pbx-db-repair.yml'

env:
  AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'ap-southeast-7' }}
  EC2_HOST: ${{ github.event.inputs.ec2_host || '43.210.122.111' }}
  EC2_USER: ${{ github.event.inputs.ec2_user || 'ubuntu' }}
  PROJECT_PATH: ${{ github.event.inputs.project_path || '/opt/phone11ai/cloudphone11' }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

permissions:
  contents: read

jobs:
  repair-pbx-db-credentials:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare repair script
        run: |
          cat > /tmp/phone11-pbx-db-repair.sh <<'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail

          LIVE_PROJECT_PATH="${PROJECT_PATH:?missing PROJECT_PATH}"
          DEPLOY_CHECKOUT="${DEPLOY_CHECKOUT:-/opt/phone11ai/codex-phone11-deploy}"

          echo "=== Phone11 PBX database credential repair ==="
          echo "Host: $(hostname)"
          echo "Time: $(date -Iseconds)"

          ENV_FILE=""
          for candidate in \
            "$DEPLOY_CHECKOUT/.env" \
            "$LIVE_PROJECT_PATH/infra/compose/.env" \
            "$LIVE_PROJECT_PATH/.env" \
            "$LIVE_PROJECT_PATH/infra/compose/.env.production" \
            "$LIVE_PROJECT_PATH/.env.production" \
            "/opt/phone11ai/.env" \
            "/opt/phone11ai/cloudphone11/.env"; do
            if [ -f "$candidate" ]; then ENV_FILE="$candidate"; break; fi
          done

          if [ -z "$ENV_FILE" ]; then
            echo "ERROR: No EC2 runtime env file found."
            exit 40
          fi
          echo "Using runtime env path: $ENV_FILE"

          read_env_file() {
            awk -F= -v key="$1" '$1 == key {sub(/^[^=]*=/, ""); print; exit}' "$ENV_FILE"
          }

          DB_NAME_VALUE="$(read_env_file DB_NAME)"
          DB_USER_VALUE="$(read_env_file DB_USER)"
          DB_PASSWORD_VALUE="$(read_env_file DB_PASSWORD)"
          DB_NAME_VALUE="${DB_NAME_VALUE:-cloudphone11}"
          DB_USER_VALUE="${DB_USER_VALUE:-cloudphone11}"

          if [ -z "$DB_PASSWORD_VALUE" ]; then
            echo "ERROR: DB_PASSWORD is missing in runtime env."
            exit 41
          fi
          if ! docker ps --format '{{.Names}}' | grep -qx 'cp11-postgres'; then
            echo "ERROR: cp11-postgres is not running."
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' || true
            exit 42
          fi
          if ! docker ps --format '{{.Names}}' | grep -qx 'cp11-backend'; then
            echo "ERROR: cp11-backend is not running."
            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' || true
            exit 43
          fi

          echo "Target database: $DB_NAME_VALUE"
          echo "Target role: $DB_USER_VALUE"

          echo "--- Backend PG env summary before repair ---"
          docker inspect cp11-backend --format '{{range .Config.Env}}{{println .}}{{end}}' | awk -F= '
            /^(PG_HOST|PG_PORT|PG_USER|PG_DATABASE|PG_SSL)=/ {print}
            /^(PG_PASSWORD|PG_CONNECTION_STRING|DATABASE_URL)=/ {print $1"=<redacted>"}
          ' || true

          echo "--- Aligning Postgres role password with EC2 runtime env ---"
          docker exec -i -u postgres cp11-postgres psql -U "$DB_USER_VALUE" -d "$DB_NAME_VALUE" -v ON_ERROR_STOP=1 -v db_user="$DB_USER_VALUE" -v db_password="$DB_PASSWORD_VALUE" <<'SQL'
          ALTER ROLE :"db_user" WITH PASSWORD :'db_password';
          SQL
          echo "Postgres role password aligned."

          echo "--- Verifying backend container can authenticate with PG_* settings ---"
          docker exec cp11-backend node --input-type=module <<'NODE'
          import pg from 'pg';

          const required = ['PG_HOST', 'PG_USER', 'PG_PASSWORD', 'PG_DATABASE'];
          const missing = required.filter((key) => !process.env[key]);
          if (missing.length) {
            console.error(`Missing backend PG env: ${missing.join(', ')}`);
            process.exit(50);
          }

          const pool = new pg.Pool({
            host: process.env.PG_HOST,
            port: Number(process.env.PG_PORT || 5432),
            user: process.env.PG_USER,
            password: process.env.PG_PASSWORD,
            database: process.env.PG_DATABASE,
            ssl: false,
            connectionTimeoutMillis: 5000,
          });

          try {
            const result = await pool.query('select current_user, current_database()');
            const row = result.rows[0];
            console.log(`Backend PG auth OK as ${row.current_user} on ${row.current_database}`);
          } finally {
            await pool.end();
          }
          NODE

          echo "--- Restarting backend to clear old failed pools ---"
          docker restart cp11-backend >/dev/null
          sleep 5

          echo "--- Health check ---"
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:3000/health; then
              echo ""
              echo "Backend restarted and healthy."
              exit 0
            fi
            sleep 3
          done

          echo "ERROR: backend health check failed after credential repair. Recent logs:"
          docker logs --tail=120 cp11-backend 2>&1 | sed -E 's#(postgres://)[^:@/]+:[^@]+@#\1<redacted>:<redacted>@#g; s#(password authentication failed for user )"[^"]+"#\1"<db-user>"#g' || true
          exit 44
          SCRIPT
          chmod +x /tmp/phone11-pbx-db-repair.sh

      - name: Locate EC2 instance through AWS
        id: ec2
        run: |
          if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo "ERROR: AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY must be configured."
            exit 30
          fi

          INSTANCE_JSON=$(aws ec2 describe-instances \
            --filters "Name=ip-address,Values=$EC2_HOST" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0]' \
            --output json)

          INSTANCE_ID=$(echo "$INSTANCE_JSON" | jq -r '.InstanceId // empty')
          AZ=$(echo "$INSTANCE_JSON" | jq -r '.Placement.AvailabilityZone // empty')
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "null" ]; then
            echo "ERROR: Could not find a running EC2 instance with public IP $EC2_HOST"
            exit 31
          fi

          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "az=$AZ" >> "$GITHUB_OUTPUT"
          echo "Found EC2 instance $INSTANCE_ID in $AZ"

      - name: Repair through EC2 Instance Connect
        run: |
          INSTANCE_ID='${{ steps.ec2.outputs.instance_id }}'
          AZ='${{ steps.ec2.outputs.az }}'

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keygen -t ed25519 -N '' -f ~/.ssh/phone11_temp_eic_key -C phone11-github-actions

          aws ec2-instance-connect send-ssh-public-key \
            --instance-id "$INSTANCE_ID" \
            --availability-zone "$AZ" \
            --instance-os-user "$EC2_USER" \
            --ssh-public-key "file://$HOME/.ssh/phone11_temp_eic_key.pub"

          scp -i ~/.ssh/phone11_temp_eic_key -o StrictHostKeyChecking=no /tmp/phone11-pbx-db-repair.sh "$EC2_USER@$EC2_HOST:/tmp/phone11-pbx-db-repair.sh"
          ssh -i ~/.ssh/phone11_temp_eic_key -o StrictHostKeyChecking=no "$EC2_USER@$EC2_HOST" \
            "PROJECT_PATH='$PROJECT_PATH' bash /tmp/phone11-pbx-db-repair.sh"
