name: Phone11 SIP Register Self-Test

on:
  workflow_dispatch:
  push:
    branches:
      - codex/phone11-mobile-pjsip-20260506
    paths:
      - '.github/workflows/phone11-sip-register-self-test.yml'
      - 'ops/phone11-sip-register-self-test-trigger-*'

concurrency:
  group: phone11-sip-register-self-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'ap-southeast-7' }}
  EC2_HOST: '43.209.112.208'
  EC2_USER: 'ubuntu'
  PILOT_USER_ID: '1'
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

jobs:
  sip-register-self-test:
    name: Test backend-provisioned SIP registration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Test SIP REGISTER from live EC2
        shell: bash
        run: |
          set -Eeuo pipefail

          if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo 'ERROR: AWS credentials are not configured.'
            exit 30
          fi

          echo '=== Phone11 SIP REGISTER self-test ==='
          echo "Time: $(date -u -Iseconds)"
          echo '--- Locate EC2 ---'
          INSTANCE_JSON=$(aws ec2 describe-instances --filters "Name=ip-address,Values=$EC2_HOST" "Name=instance-state-name,Values=running" --query 'Reservations[0].Instances[0]' --output json)
          INSTANCE_ID=$(echo "$INSTANCE_JSON" | jq -r '.InstanceId // empty')
          AZ=$(echo "$INSTANCE_JSON" | jq -r '.Placement.AvailabilityZone // empty')
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = 'null' ]; then
            echo "ERROR: Could not find running EC2 instance for $EC2_HOST"
            exit 32
          fi
          echo "Found EC2 instance $INSTANCE_ID in $AZ"

          echo '--- Prepare temporary SSH access ---'
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keygen -t ed25519 -N '' -f ~/.ssh/phone11_temp_eic_key -C phone11-github-actions >/dev/null 2>&1
          aws ec2-instance-connect send-ssh-public-key --instance-id "$INSTANCE_ID" --availability-zone "$AZ" --instance-os-user "$EC2_USER" --ssh-public-key "file://$HOME/.ssh/phone11_temp_eic_key.pub"

          echo '--- Prepare remote SIP REGISTER test script ---'
          cat >/tmp/phone11-sip-register-self-test-remote.sh <<'REMOTE'
          #!/usr/bin/env bash
          set -Eeuo pipefail

          echo '--- Runtime containers ---'
          docker ps --format '{{.Names}} {{.Image}} {{.Status}}' | grep -E '^cp11-backend\b|phone11' || true

          echo '--- Fetch backend-provisioned SIP config and test REGISTER ---'
          docker exec -i -e PILOT_USER_ID="${PILOT_USER_ID:-1}" cp11-backend node --input-type=module - <<'NODE'
          import crypto from 'node:crypto';
          import dgram from 'node:dgram';
          import os from 'node:os';
          import pg from 'pg';
          import { SignJWT } from 'jose';
          import { createTRPCClient, httpBatchLink } from '@trpc/client';
          import superjson from 'superjson';

          const firstEnv = (...keys) => keys.map((key) => process.env[key]).find((value) => value && value.length > 0);
          const md5 = (value) => crypto.createHash('md5').update(value).digest('hex');
          const pilotUserId = Number.parseInt(process.env.PILOT_USER_ID || '1', 10);

          function localIPv4() {
            for (const entries of Object.values(os.networkInterfaces())) {
              for (const entry of entries || []) {
                if (entry.family === 'IPv4' && !entry.internal) return entry.address;
              }
            }
            return '127.0.0.1';
          }

          function parseDigest(header) {
            const digest = {};
            const text = (header || '').replace(/^\s*Digest\s+/i, '');
            for (const part of text.match(/(?:[^,"']+|"[^"]*")+/g) || []) {
              const idx = part.indexOf('=');
              if (idx <= 0) continue;
              const key = part.slice(0, idx).trim().toLowerCase();
              let value = part.slice(idx + 1).trim();
              if (value.startsWith('"') && value.endsWith('"')) value = value.slice(1, -1);
              digest[key] = value;
            }
            return digest;
          }

          function getHeader(response, name) {
            const lower = name.toLowerCase();
            return response.split(/\r?\n/).find((line) => line.toLowerCase().startsWith(lower + ':'))?.slice(name.length + 1).trim() || '';
          }

          function statusCode(response) {
            const first = response.split(/\r?\n/)[0] || '';
            const match = first.match(/^SIP\/2\.0\s+(\d+)/);
            return match ? Number(match[1]) : 0;
          }

          async function sendUdp(message, host, port, timeoutMs = 7000) {
            return await new Promise((resolve, reject) => {
              const socket = dgram.createSocket('udp4');
              const timer = setTimeout(() => {
                socket.close();
                reject(new Error(`Timed out waiting for SIP response from ${host}:${port}`));
              }, timeoutMs);
              socket.on('message', (msg) => {
                clearTimeout(timer);
                const response = msg.toString('utf8');
                socket.close();
                resolve(response);
              });
              socket.on('error', (error) => {
                clearTimeout(timer);
                socket.close();
                reject(error);
              });
              socket.bind(0, '0.0.0.0', () => {
                socket.send(Buffer.from(message, 'utf8'), port, host);
              });
            });
          }

          function buildRegister({ username, domain, localIp, localPort, branch, tag, callId, cseq, authorization }) {
            const lines = [
              `REGISTER sip:${domain} SIP/2.0`,
              `Via: SIP/2.0/UDP ${localIp}:${localPort};branch=${branch};rport`,
              'Max-Forwards: 70',
              `From: "${username}" <sip:${username}@${domain}>;tag=${tag}`,
              `To: <sip:${username}@${domain}>`,
              `Call-ID: ${callId}`,
              `CSeq: ${cseq} REGISTER`,
              `Contact: <sip:${username}@${localIp}:${localPort};transport=udp>`,
              'Expires: 120',
              'User-Agent: Phone11-CI-SIP-Register-Test',
            ];
            if (authorization) lines.push(`Authorization: ${authorization}`);
            lines.push('Content-Length: 0', '', '');
            return lines.join('\r\n');
          }

          async function provisionConfig() {
            const cfg = {
              host: firstEnv('PG_HOST', 'DB_HOST', 'POSTGRES_HOST'),
              port: Number(firstEnv('PG_PORT', 'DB_PORT', 'POSTGRES_PORT') || 5432),
              user: firstEnv('PG_USER', 'DB_USER', 'POSTGRES_USER'),
              password: firstEnv('PG_PASSWORD', 'DB_PASSWORD', 'POSTGRES_PASSWORD'),
              database: firstEnv('PG_DATABASE', 'DB_NAME', 'DB_DATABASE', 'POSTGRES_DB'),
            };
            const jwtSecret = firstEnv('JWT_SECRET');
            if (!jwtSecret) throw new Error('JWT_SECRET is missing');
            const sslMode = firstEnv('PG_SSL', 'DB_SSL', 'POSTGRES_SSL', 'DATABASE_SSL')?.toLowerCase();
            const ssl = sslMode === 'false' || sslMode === '0' || sslMode === 'disable' ? false : { rejectUnauthorized: false };
            const pool = new pg.Pool({ ...cfg, ssl, connectionTimeoutMillis: 5000, max: 2 });
            let user;
            try {
              const userResult = await pool.query('select id, "openId", name, email from users where id = $1 limit 1', [pilotUserId]);
              if (!userResult.rows.length) throw new Error(`No users row found for id ${pilotUserId}`);
              user = userResult.rows[0];
              if (!user.openId) throw new Error(`User ${pilotUserId} has no openId`);
            } finally {
              await pool.end();
            }
            const token = await new SignJWT({ openId: user.openId, appId: firstEnv('VITE_APP_ID') || '', name: user.name || user.email || `User ${user.id}` })
              .setProtectedHeader({ alg: 'HS256', typ: 'JWT' })
              .setExpirationTime(Math.floor((Date.now() + 365 * 24 * 60 * 60 * 1000) / 1000))
              .sign(new TextEncoder().encode(jwtSecret));
            const client = createTRPCClient({
              links: [httpBatchLink({
                url: 'http://127.0.0.1:3000/api/trpc',
                transformer: superjson,
                headers: () => ({ Authorization: `Bearer ${token}` }),
              })],
            });
            const config = await client.phone.ensurePilotConfig.mutate();
            if (!config?.configured || !config?.sip?.username || !config?.sip?.password || !config?.sip?.domain) {
              throw new Error('Backend did not return complete SIP config');
            }
            return config;
          }

          const config = await provisionConfig();
          const username = String(config.sip.username);
          const password = String(config.sip.password);
          const domain = String(config.sip.domain);
          const port = Number(config.sip.port || 5060);
          const transport = String(config.sip.transport || 'UDP').toUpperCase();
          if (transport !== 'UDP') throw new Error(`This self-test currently supports UDP only; backend returned ${transport}`);
          console.log(`Provisioned SIP account: extension=${config.extension?.number || '<missing>'}, username=${username}, domain=${domain}, port=${port}, transport=${transport}, password=<set>`);

          const localIp = localIPv4();
          const localPort = 50990 + Math.floor(Math.random() * 500);
          const callId = `${crypto.randomUUID()}@phone11-ci`;
          const tag = crypto.randomBytes(6).toString('hex');
          const branch1 = `z9hG4bK-${crypto.randomBytes(8).toString('hex')}`;
          const firstRegister = buildRegister({ username, domain, localIp, localPort, branch: branch1, tag, callId, cseq: 1 });
          const firstResponse = await sendUdp(firstRegister, domain, port);
          const firstStatus = statusCode(firstResponse);
          console.log(`Initial REGISTER response: ${firstResponse.split(/\r?\n/)[0] || '<empty>'}`);
          if (firstStatus === 200) {
            console.log('SIP REGISTER accepted without challenge.');
            process.exit(0);
          }
          if (firstStatus !== 401 && firstStatus !== 407) {
            throw new Error(`Expected 401/407 digest challenge, got ${firstStatus || 'no SIP status'}`);
          }

          const challengeHeader = getHeader(firstResponse, firstStatus === 407 ? 'Proxy-Authenticate' : 'WWW-Authenticate');
          const challenge = parseDigest(challengeHeader);
          if (!challenge.realm || !challenge.nonce) throw new Error('Digest challenge missing realm or nonce');
          const uri = `sip:${domain}`;
          const qop = (challenge.qop || '').split(',').map((value) => value.trim()).find((value) => value === 'auth');
          const cnonce = crypto.randomBytes(8).toString('hex');
          const nc = '00000001';
          const ha1 = md5(`${username}:${challenge.realm}:${password}`);
          const ha2 = md5(`REGISTER:${uri}`);
          const response = qop ? md5(`${ha1}:${challenge.nonce}:${nc}:${cnonce}:${qop}:${ha2}`) : md5(`${ha1}:${challenge.nonce}:${ha2}`);
          const authParts = [
            `Digest username="${username}"`,
            `realm="${challenge.realm}"`,
            `nonce="${challenge.nonce}"`,
            `uri="${uri}"`,
            `response="${response}"`,
            'algorithm=MD5',
          ];
          if (challenge.opaque) authParts.push(`opaque="${challenge.opaque}"`);
          if (qop) authParts.push(`qop=${qop}`, `nc=${nc}`, `cnonce="${cnonce}"`);
          const authorization = authParts.join(', ');
          const branch2 = `z9hG4bK-${crypto.randomBytes(8).toString('hex')}`;
          const secondRegister = buildRegister({ username, domain, localIp, localPort, branch: branch2, tag, callId, cseq: 2, authorization });
          const secondResponse = await sendUdp(secondRegister, domain, port);
          const secondStatus = statusCode(secondResponse);
          console.log(`Authenticated REGISTER response: ${secondResponse.split(/\r?\n/)[0] || '<empty>'}`);
          if (secondStatus !== 200) {
            throw new Error(`SIP REGISTER failed after digest auth with status ${secondStatus || 'no SIP status'}`);
          }
          console.log('SIP REGISTER self-test succeeded. Kamailio accepted the backend-provisioned account.');
          NODE
          REMOTE

          echo '--- Run remote SIP REGISTER test ---'
          scp -i ~/.ssh/phone11_temp_eic_key -o StrictHostKeyChecking=no /tmp/phone11-sip-register-self-test-remote.sh "$EC2_USER@$EC2_HOST:/tmp/phone11-sip-register-self-test-remote.sh"
          ssh -i ~/.ssh/phone11_temp_eic_key -o StrictHostKeyChecking=no "$EC2_USER@$EC2_HOST" "PILOT_USER_ID='$PILOT_USER_ID' bash /tmp/phone11-sip-register-self-test-remote.sh"
