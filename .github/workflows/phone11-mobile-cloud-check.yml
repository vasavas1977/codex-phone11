name: Phone11 Mobile Native Check

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "app/**"
      - "components/**"
      - "hooks/**"
      - "lib/**"
      - "scripts/**"
      - "docs/**"
      - "app.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - "eas.json"
      - ".github/workflows/phone11-mobile-cloud-check.yml"
      - ".github/workflows/phone11-eas-android-dev-client.yml"
      - ".github/workflows/phone11-eas-ios-dev-client.yml"

permissions:
  contents: read

jobs:
  install-test-config:
    name: Install, test, and validate Expo config
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate
          pnpm --version

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Validate Expo config
        run: pnpm exec expo config --type public

  native-dev-client-prebuild:
    name: Validate native dev-client prebuild
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate
          pnpm --version

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Confirm native dev-client dependencies
        run: pnpm list expo-dev-client react-native-callkeep @config-plugins/react-native-callkeep --depth 0

      - name: Validate Expo config
        run: pnpm exec expo config --type public

      - name: Prebuild native projects without installing pods/gradle deps
        run: pnpm exec expo prebuild --clean --no-install

  android-gradle-assemble:
    name: Compile Android debug build
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate
          pnpm --version

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Prebuild Android project
        run: pnpm exec expo prebuild --clean --platform android --no-install

      - name: Compile Android debug build
        working-directory: android
        run: ./gradlew :app:assembleDebug --stacktrace
