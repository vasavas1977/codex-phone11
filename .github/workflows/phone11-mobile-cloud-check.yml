name: Phone11 Mobile Cloud Check

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "app/**"
      - "components/**"
      - "hooks/**"
      - "lib/**"
      - "scripts/**"
      - "docs/**"
      - "app.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - "eas.json"
      - ".github/workflows/phone11-mobile-cloud-check.yml"

jobs:
  install-and-config:
    name: Install and validate Expo config
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate
          pnpm --version

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Expo config
        run: pnpm exec expo config --type public

  dev-client-resolution:
    name: Resolve dev-client native dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate
          pnpm --version

      - name: Resolve Phone11 dev-client packages
        run: |
          pnpm install --frozen-lockfile
          pnpm add expo-dev-client@~6.0.15 react-native-callkeep@4.3.16 --lockfile-only
          pnpm add -D @config-plugins/react-native-callkeep@12.0.0 --lockfile-only
          pnpm install --frozen-lockfile=false

      - name: Validate Expo config after dev-client resolution
        run: pnpm exec expo config --type public
