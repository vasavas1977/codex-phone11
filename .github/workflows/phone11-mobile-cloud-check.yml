name: Phone11 Mobile Native Check

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "app/**"
      - "components/**"
      - "hooks/**"
      - "lib/**"
      - "scripts/**"
      - "docs/**"
      - "app.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - "eas.json"
      - ".github/workflows/phone11-mobile-cloud-check.yml"

permissions:
  contents: write

jobs:
  install-test-config:
    name: Install, test, and validate Expo config
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate
          pnpm --version

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Validate Expo config
        run: pnpm exec expo config --type public

  native-dev-client-setup:
    name: Install native dev-client dependencies and prebuild
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.12.0 --activate
          pnpm --version

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Phone11 dev-client setup
        run: pnpm setup:dev-client

      - name: Show dependency changes
        run: git status --short -- package.json pnpm-lock.yaml

      - name: Commit dependency changes
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          if git diff --quiet -- package.json pnpm-lock.yaml; then
            echo "No dependency changes to commit."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package.json pnpm-lock.yaml
            git commit -m "Install Phone11 native dev-client dependencies"
            git push
          fi

      - name: Validate Expo config after dev-client setup
        run: pnpm exec expo config --type public

      - name: Prebuild native projects without installing pods/gradle deps
        run: pnpm exec expo prebuild --clean --no-install
