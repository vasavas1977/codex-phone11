name: Deploy Backend to EC2

on:
  workflow_dispatch:
    inputs:
      ec2_host:
        description: 'EC2 public IP or DNS'
        required: true
        default: '43.210.122.111'
      ec2_user:
        description: 'SSH/Linux user'
        required: true
        default: 'ubuntu'
      project_path:
        description: 'Current live Phone11 path on EC2'
        required: true
        default: '/opt/phone11ai/cloudphone11'
      branch:
        description: 'Git branch to deploy'
        required: true
        default: 'main'

env:
  AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'ap-southeast-7' }}
  EC2_HOST: ${{ github.event.inputs.ec2_host }}
  EC2_USER: ${{ github.event.inputs.ec2_user }}
  PROJECT_PATH: ${{ github.event.inputs.project_path }}
  DEPLOY_BRANCH: ${{ github.event.inputs.branch }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
  EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}

permissions:
  contents: read

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare deploy script
        run: |
          cat > /tmp/phone11-ec2-deploy.sh <<'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail

          LIVE_PROJECT_PATH="${PROJECT_PATH:?missing PROJECT_PATH}"
          DEPLOY_BRANCH="${DEPLOY_BRANCH:-main}"
          PUBLIC_HOST="${PUBLIC_HOST:-}"
          REPO_URL="${REPO_URL:-https://github.com/vasavas1977/codex-phone11.git}"
          DEPLOY_CHECKOUT="${DEPLOY_CHECKOUT:-/opt/phone11ai/codex-phone11-deploy}"
          BACKUP_DIR="/opt/phone11ai/deploy-backups/$(date -u +%Y%m%dT%H%M%SZ)"

          if command -v sudo >/dev/null 2>&1; then SUDO=sudo; else SUDO=; fi

          echo "=== Phone11 backend deploy ==="
          echo "Live project path: $LIVE_PROJECT_PATH"
          echo "Deploy branch: $DEPLOY_BRANCH"

          if [ -d "$LIVE_PROJECT_PATH/.git" ]; then
            WORK_PATH="$LIVE_PROJECT_PATH"
            echo "Live path is a Git checkout; deploying in place."
            cd "$WORK_PATH"
            if [ -n "$(git status --porcelain)" ]; then
              echo "ERROR: live checkout has uncommitted changes. Refusing to deploy until reviewed."
              git status --short
              exit 21
            fi
            git fetch origin "$DEPLOY_BRANCH"
            git checkout "$DEPLOY_BRANCH"
            git merge --ff-only "origin/$DEPLOY_BRANCH"
          else
            WORK_PATH="$DEPLOY_CHECKOUT"
            echo "Live path is not a Git checkout; using safe deploy checkout: $WORK_PATH"
            $SUDO mkdir -p "$(dirname "$WORK_PATH")"
            if [ -e "$WORK_PATH" ] && [ ! -d "$WORK_PATH/.git" ] && [ -n "$(ls -A "$WORK_PATH" 2>/dev/null || true)" ]; then
              echo "ERROR: $WORK_PATH exists but is not an empty directory or Git checkout."
              exit 25
            fi
            if [ ! -d "$WORK_PATH/.git" ]; then
              $SUDO mkdir -p "$WORK_PATH"
              $SUDO chown -R "$(id -u):$(id -g)" "$WORK_PATH"
              git clone --branch "$DEPLOY_BRANCH" "$REPO_URL" "$WORK_PATH"
            fi
            cd "$WORK_PATH"
            git fetch origin "$DEPLOY_BRANCH"
            git checkout "$DEPLOY_BRANCH"
            git reset --hard "origin/$DEPLOY_BRANCH"
          fi

          cd "$WORK_PATH"
          mkdir -p infra/compose "$BACKUP_DIR"

          ENV_SOURCE=""
          for candidate in \
            "$LIVE_PROJECT_PATH/infra/compose/.env" \
            "$LIVE_PROJECT_PATH/.env" \
            "$LIVE_PROJECT_PATH/infra/compose/.env.production" \
            "$LIVE_PROJECT_PATH/.env.production" \
            "/opt/phone11ai/.env" \
            "/opt/phone11ai/cloudphone11/.env"; do
            if [ -f "$candidate" ]; then ENV_SOURCE="$candidate"; break; fi
          done
          if [ -z "$ENV_SOURCE" ]; then
            ENV_SOURCE=$(find "$LIVE_PROJECT_PATH" /opt/phone11ai -maxdepth 5 -type f \( -name ".env" -o -name ".env.production" -o -name "prod.env" -o -name "production.env" \) 2>/dev/null | head -n 1 || true)
          fi

          ENV_FILE="$WORK_PATH/.env"
          if [ -n "$ENV_SOURCE" ]; then
            cp -a "$ENV_SOURCE" "$ENV_FILE"
            echo "Copied runtime env file from $(dirname "$ENV_SOURCE")/$(basename "$ENV_SOURCE")"
          else
            touch "$ENV_FILE"
            echo "Created deploy env file because no existing runtime env was found."
          fi

          for path in infra/compose/tls infra/compose/apns; do
            if [ -e "$LIVE_PROJECT_PATH/$path" ]; then
              rm -rf "$WORK_PATH/$path"
              mkdir -p "$WORK_PATH/$(dirname "$path")"
              cp -a "$LIVE_PROJECT_PATH/$path" "$WORK_PATH/$path"
              echo "Copied runtime config: $path"
            fi
          done

          for path in server/phone-provisioning.ts server/routers.ts infra/compose/docker-compose.prod.yml .github/workflows/deploy-ec2-backend.yml; do
            if [ -f "$WORK_PATH/$path" ]; then
              mkdir -p "$BACKUP_DIR/$(dirname "$path")"
              cp "$WORK_PATH/$path" "$BACKUP_DIR/$path"
            fi
          done

          if docker compose version >/dev/null 2>&1; then
            COMPOSE="docker compose"
          elif command -v docker-compose >/dev/null 2>&1; then
            COMPOSE="docker-compose"
          else
            echo "ERROR: docker compose is not available on EC2."
            exit 22
          fi

          COMPOSE_FILE="infra/compose/docker-compose.prod.yml"
          if [ ! -f "$COMPOSE_FILE" ]; then
            echo "ERROR: $COMPOSE_FILE not found."
            exit 23
          fi

          read_env_file() {
            awk -F= -v key="$1" '$1 == key {sub(/^[^=]*=/, ""); print; exit}' "$ENV_FILE"
          }

          set_env_if_missing() {
            key="$1"
            value="${2:-}"
            if [ -n "$value" ] && ! grep -Eq "^${key}=.+" "$ENV_FILE"; then
              printf '%s=%s\n' "$key" "$value" >> "$ENV_FILE"
            fi
          }

          first_nonempty() {
            for value in "$@"; do
              if [ -n "$value" ]; then printf '%s' "$value"; return 0; fi
            done
          }

          gen_secret() {
            if command -v openssl >/dev/null 2>&1; then
              openssl rand -base64 36 | tr -d '\n=' | tr '+/' '_-'
            else
              date +%s%N | sha256sum | awk '{print $1}'
            fi
          }

          CONTAINER_ENV=$(mktemp)
          if command -v docker >/dev/null 2>&1 && docker ps -aq >/dev/null 2>&1; then
            docker ps -aq | while read -r container_id; do
              [ -n "$container_id" ] || continue
              docker inspect --format '{{range .Config.Env}}{{println .}}{{end}}' "$container_id" >> "$CONTAINER_ENV" 2>/dev/null || true
            done
          fi

          get_container_env() {
            awk -F= -v key="$1" '$1 == key {sub(/^[^=]*=/, ""); print; exit}' "$CONTAINER_ENV"
          }

          DATABASE_URL_VALUE=$(first_nonempty "$(read_env_file DATABASE_URL)" "$(read_env_file PG_CONNECTION_STRING)" "$(get_container_env DATABASE_URL)" "$(get_container_env PG_CONNECTION_STRING)")
          REDIS_URL_VALUE=$(first_nonempty "$(read_env_file REDIS_URL)" "$(get_container_env REDIS_URL)")

          DB_USER_VALUE=$(first_nonempty "$(read_env_file DB_USER)" "$(read_env_file PG_USER)" "$(get_container_env DB_USER)" "$(get_container_env PG_USER)" "$(get_container_env POSTGRES_USER)")
          DB_PASSWORD_VALUE=$(first_nonempty "$(read_env_file DB_PASSWORD)" "$(read_env_file PG_PASSWORD)" "$(get_container_env DB_PASSWORD)" "$(get_container_env PG_PASSWORD)" "$(get_container_env POSTGRES_PASSWORD)")
          DB_NAME_VALUE=$(first_nonempty "$(read_env_file DB_NAME)" "$(read_env_file PG_DATABASE)" "$(get_container_env DB_NAME)" "$(get_container_env PG_DATABASE)" "$(get_container_env POSTGRES_DB)")

          if [ -n "$DATABASE_URL_VALUE" ]; then
            DB_USER_VALUE=$(first_nonempty "$DB_USER_VALUE" "$(printf '%s' "$DATABASE_URL_VALUE" | sed -n 's#^[^:]*://\([^:/@]*\):.*#\1#p')")
            DB_PASSWORD_VALUE=$(first_nonempty "$DB_PASSWORD_VALUE" "$(printf '%s' "$DATABASE_URL_VALUE" | sed -n 's#^[^:]*://[^:/@]*:\([^@]*\)@.*#\1#p')")
            DB_NAME_VALUE=$(first_nonempty "$DB_NAME_VALUE" "$(printf '%s' "$DATABASE_URL_VALUE" | sed -n 's#^.*/\([^/?]*\).*#\1#p')")
          fi

          DB_USER_VALUE=$(first_nonempty "$DB_USER_VALUE" "cloudphone11")
          DB_NAME_VALUE=$(first_nonempty "$DB_NAME_VALUE" "cloudphone11")
          DB_PASSWORD_VALUE=$(first_nonempty "$DB_PASSWORD_VALUE" "$(gen_secret)")

          REDIS_PASSWORD_VALUE=$(first_nonempty "$(read_env_file REDIS_PASSWORD)" "$(get_container_env REDIS_PASSWORD)")
          if [ -z "$REDIS_PASSWORD_VALUE" ] && [ -n "$REDIS_URL_VALUE" ]; then
            REDIS_PASSWORD_VALUE=$(printf '%s' "$REDIS_URL_VALUE" | sed -n 's#^redis://:\([^@]*\)@.*#\1#p')
          fi
          REDIS_PASSWORD_VALUE=$(first_nonempty "$REDIS_PASSWORD_VALUE" "$(gen_secret)")

          EXTERNAL_IP_VALUE=$(first_nonempty "$(read_env_file EXTERNAL_IP)" "$(get_container_env EXTERNAL_IP)" "$(get_container_env EXTERNAL_SIP_IP)" "$PUBLIC_HOST")
          if [ -z "$EXTERNAL_IP_VALUE" ]; then
            EXTERNAL_IP_VALUE="$(curl -fsS --max-time 2 http://169.254.169.254/latest/meta-data/public-ipv4 2>/dev/null || true)"
          fi
          PRIVATE_IP_VALUE=$(first_nonempty "$(read_env_file PRIVATE_IP)" "$(get_container_env PRIVATE_IP)" "$(hostname -I 2>/dev/null | awk '{print $1}')")
          SIP_DOMAIN_VALUE=$(first_nonempty "$(read_env_file SIP_DOMAIN)" "$(get_container_env SIP_DOMAIN)" "$(get_container_env FREESWITCH_DOMAIN)" "$PUBLIC_HOST" "$EXTERNAL_IP_VALUE")
          FS_ESL_PASSWORD_VALUE=$(first_nonempty "$(read_env_file FS_ESL_PASSWORD)" "$(get_container_env FS_ESL_PASSWORD)" "$(get_container_env FREESWITCH_ESL_PASSWORD)" "$(gen_secret)")
          JWT_SECRET_VALUE=$(first_nonempty "$(read_env_file JWT_SECRET)" "$(get_container_env JWT_SECRET)" "$(read_env_file SESSION_SECRET)" "$(get_container_env SESSION_SECRET)" "$(read_env_file AUTH_SECRET)" "$(get_container_env AUTH_SECRET)" "$(gen_secret)")
          STORAGE_BUCKET_VALUE=$(first_nonempty "$(read_env_file STORAGE_BUCKET)" "$(get_container_env STORAGE_BUCKET)" "$(read_env_file S3_BUCKET)" "$(get_container_env S3_BUCKET)" "phone11-recordings")
          FCM_API_KEY_VALUE=$(first_nonempty "$(read_env_file FCM_API_KEY)" "$(get_container_env FCM_API_KEY)" "disabled")

          set_env_if_missing DB_NAME "$DB_NAME_VALUE"
          set_env_if_missing DB_USER "$DB_USER_VALUE"
          set_env_if_missing DB_PASSWORD "$DB_PASSWORD_VALUE"
          set_env_if_missing REDIS_PASSWORD "$REDIS_PASSWORD_VALUE"
          set_env_if_missing SIP_DOMAIN "$SIP_DOMAIN_VALUE"
          set_env_if_missing EXTERNAL_IP "$EXTERNAL_IP_VALUE"
          set_env_if_missing PRIVATE_IP "$PRIVATE_IP_VALUE"
          set_env_if_missing FS_ESL_PASSWORD "$FS_ESL_PASSWORD_VALUE"
          set_env_if_missing FCM_API_KEY "$FCM_API_KEY_VALUE"
          set_env_if_missing JWT_SECRET "$JWT_SECRET_VALUE"
          set_env_if_missing STORAGE_BUCKET "$STORAGE_BUCKET_VALUE"

          rm -f "$CONTAINER_ENV"
          cp -a "$ENV_FILE" "$WORK_PATH/infra/compose/.env"
          if [ -n "$ENV_SOURCE" ] && [ -f "$ENV_SOURCE" ] && [ "$ENV_SOURCE" != "$ENV_FILE" ]; then
            cp -a "$ENV_FILE" "$ENV_SOURCE"
            echo "Persisted missing runtime env keys back to the EC2 source env file without printing values."
          fi
          echo "Hydrated Compose env without printing secret values."

          echo "Backup: $BACKUP_DIR"
          echo "Deploy commit: $(git rev-parse --short HEAD)"
          echo "Building backend container..."
          $COMPOSE --env-file "$ENV_FILE" -f "$COMPOSE_FILE" build backend

          echo "Restarting backend container..."
          $COMPOSE --env-file "$ENV_FILE" -f "$COMPOSE_FILE" up -d backend

          echo "Backend container status:"
          $COMPOSE --env-file "$ENV_FILE" -f "$COMPOSE_FILE" ps backend

          echo "Health check:"
          for i in $(seq 1 20); do
            if curl -fsS http://127.0.0.1:3000/health; then
              echo ""
              echo "Backend health check passed"
              exit 0
            fi
            sleep 3
          done

          echo "ERROR: backend health check failed after restart. Recent logs:"
          $COMPOSE --env-file "$ENV_FILE" -f "$COMPOSE_FILE" logs --tail=120 backend || true
          exit 24
          SCRIPT
          chmod +x /tmp/phone11-ec2-deploy.sh

      - name: Deploy via SSH key if available
        id: ssh_deploy
        continue-on-error: true
        run: |
          if [ -z "${EC2_SSH_KEY:-}" ]; then
            echo "No EC2_SSH_KEY secret configured; skipping direct SSH path."
            echo "used=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/phone11_ec2_key
          chmod 600 ~/.ssh/phone11_ec2_key

          scp -i ~/.ssh/phone11_ec2_key -o StrictHostKeyChecking=no /tmp/phone11-ec2-deploy.sh "$EC2_USER@$EC2_HOST:/tmp/phone11-ec2-deploy.sh"
          ssh -i ~/.ssh/phone11_ec2_key -o StrictHostKeyChecking=no "$EC2_USER@$EC2_HOST" \
            "PROJECT_PATH='$PROJECT_PATH' DEPLOY_BRANCH='$DEPLOY_BRANCH' PUBLIC_HOST='$EC2_HOST' bash /tmp/phone11-ec2-deploy.sh"

          echo "used=true" >> "$GITHUB_OUTPUT"

      - name: Locate EC2 instance through AWS
        id: ec2
        if: steps.ssh_deploy.outputs.used != 'true'
        run: |
          if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo "ERROR: Either EC2_SSH_KEY or AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY must be configured."
            exit 30
          fi

          INSTANCE_JSON=$(aws ec2 describe-instances \
            --filters "Name=ip-address,Values=$EC2_HOST" "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0]' \
            --output json)

          INSTANCE_ID=$(echo "$INSTANCE_JSON" | jq -r '.InstanceId // empty')
          AZ=$(echo "$INSTANCE_JSON" | jq -r '.Placement.AvailabilityZone // empty')
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "null" ]; then
            echo "ERROR: Could not find a running EC2 instance with public IP $EC2_HOST"
            exit 31
          fi

          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "az=$AZ" >> "$GITHUB_OUTPUT"
          echo "Found EC2 instance $INSTANCE_ID in $AZ"

      - name: Try deploy through AWS Systems Manager
        id: ssm_deploy
        if: steps.ssh_deploy.outputs.used != 'true'
        continue-on-error: true
        run: |
          INSTANCE_ID='${{ steps.ec2.outputs.instance_id }}'

          MANAGED=$(aws ssm describe-instance-information \
            --filters "Key=InstanceIds,Values=$INSTANCE_ID" \
            --query 'InstanceInformationList[0].InstanceId' \
            --output text 2>/dev/null || true)

          if [ "$MANAGED" != "$INSTANCE_ID" ]; then
            echo "Instance is not managed by SSM; skipping SSM path."
            echo "used=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          DEPLOY_B64=$(base64 -w0 /tmp/phone11-ec2-deploy.sh)
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Phone11 backend deploy from GitHub Actions" \
            --parameters "commands=echo $DEPLOY_B64 | base64 -d >/tmp/phone11-ec2-deploy.sh && chmod +x /tmp/phone11-ec2-deploy.sh && PROJECT_PATH='$PROJECT_PATH' DEPLOY_BRANCH='$DEPLOY_BRANCH' PUBLIC_HOST='$EC2_HOST' bash /tmp/phone11-ec2-deploy.sh" \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM command: $COMMAND_ID"

          for i in $(seq 1 120); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || true)
            echo "SSM status: $STATUS"
            case "$STATUS" in
              Success|Cancelled|TimedOut|Failed|Cancelling) break ;;
            esac
            sleep 5
          done

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '{Status:Status,Stdout:StandardOutputContent,Stderr:StandardErrorContent}' \
            --output json

          if [ "$STATUS" != "Success" ]; then
            exit 40
          fi

          echo "used=true" >> "$GITHUB_OUTPUT"

      - name: Try deploy through EC2 Instance Connect
        if: steps.ssh_deploy.outputs.used != 'true' && steps.ssm_deploy.outputs.used != 'true'
        run: |
          INSTANCE_ID='${{ steps.ec2.outputs.instance_id }}'
          AZ='${{ steps.ec2.outputs.az }}'

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keygen -t ed25519 -N '' -f ~/.ssh/phone11_temp_eic_key -C phone11-github-actions

          aws ec2-instance-connect send-ssh-public-key \
            --instance-id "$INSTANCE_ID" \
            --availability-zone "$AZ" \
            --instance-os-user "$EC2_USER" \
            --ssh-public-key "file://$HOME/.ssh/phone11_temp_eic_key.pub"

          scp -i ~/.ssh/phone11_temp_eic_key -o StrictHostKeyChecking=no /tmp/phone11-ec2-deploy.sh "$EC2_USER@$EC2_HOST:/tmp/phone11-ec2-deploy.sh"
          ssh -i ~/.ssh/phone11_temp_eic_key -o StrictHostKeyChecking=no "$EC2_USER@$EC2_HOST" \
            "PROJECT_PATH='$PROJECT_PATH' DEPLOY_BRANCH='$DEPLOY_BRANCH' PUBLIC_HOST='$EC2_HOST' bash /tmp/phone11-ec2-deploy.sh"
