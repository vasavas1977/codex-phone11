name: Phone11 EC2 Redeploy Mobile Branch

on:
  workflow_dispatch:
    inputs:
      ec2_host:
        description: 'EC2 public IP or DNS'
        required: true
        default: '43.210.122.111'
      ec2_user:
        description: 'SSH/Linux user'
        required: true
        default: 'ubuntu'
      deploy_checkout:
        description: 'Deployment checkout path on EC2'
        required: true
        default: '/opt/phone11ai/codex-phone11-deploy'
      pilot_user_id:
        description: 'Phone11 app user id to verify'
        required: true
        default: '1'
  push:
    branches:
      - codex/phone11-mobile-pjsip-20260506
    paths:
      - '.github/workflows/phone11-ec2-redeploy-mobile-branch.yml'

env:
  AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'ap-southeast-7' }}
  EC2_HOST: ${{ github.event.inputs.ec2_host || '43.210.122.111' }}
  EC2_USER: ${{ github.event.inputs.ec2_user || 'ubuntu' }}
  DEPLOY_CHECKOUT: ${{ github.event.inputs.deploy_checkout || '/opt/phone11ai/codex-phone11-deploy' }}
  PILOT_USER_ID: ${{ github.event.inputs.pilot_user_id || '1' }}
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}

permissions:
  contents: write

jobs:
  redeploy-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Prepare remote script
        run: |
          cat > /tmp/phone11-redeploy-mobile-branch.sh <<'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail

          echo "=== Phone11 mobile branch backend redeploy ==="
          echo "Host: $(hostname)"
          echo "Time: $(date -Iseconds)"
          echo "GitHub SHA: ${GITHUB_SHA:?missing GITHUB_SHA}"
          echo "Deploy checkout: ${DEPLOY_CHECKOUT:?missing DEPLOY_CHECKOUT}"

          mkdir -p "$DEPLOY_CHECKOUT"

          ENV_FILE=""
          for candidate in \
            "$DEPLOY_CHECKOUT/.env" \
            "/opt/phone11ai/cloudphone11/infra/compose/.env" \
            "/opt/phone11ai/cloudphone11/.env" \
            "/opt/phone11ai/.env"; do
            if [ -f "$candidate" ]; then ENV_FILE="$candidate"; break; fi
          done
          if [ -z "$ENV_FILE" ]; then
            echo "ERROR: no runtime .env file found on EC2."
            exit 51
          fi
          cp "$ENV_FILE" /tmp/phone11-runtime.env
          echo "Using runtime env path: $ENV_FILE"

          cd "$DEPLOY_CHECKOUT"
          if [ ! -d .git ]; then
            git init
            git remote add origin https://github.com/vasavas1977/codex-phone11.git
          else
            git remote set-url origin https://github.com/vasavas1977/codex-phone11.git
          fi
          git fetch --depth 1 origin "$GITHUB_SHA"
          git checkout --force FETCH_HEAD
          cp /tmp/phone11-runtime.env .env

          read_env_file() {
            awk -F= -v key="$1" '$1 == key {sub(/^[^=]*=/, ""); print; exit}' .env
          }
          DB_NAME_VALUE="$(read_env_file DB_NAME)"
          DB_USER_VALUE="$(read_env_file DB_USER)"
          DB_PASSWORD_VALUE="$(read_env_file DB_PASSWORD)"
          DB_NAME_VALUE="${DB_NAME_VALUE:-cloudphone11}"
          DB_USER_VALUE="${DB_USER_VALUE:-cloudphone11}"
          if [ -z "$DB_PASSWORD_VALUE" ]; then
            echo "ERROR: DB_PASSWORD is missing in runtime env."
            exit 52
          fi

          echo "--- Aligning Postgres role password ---"
          docker exec -i -u postgres cp11-postgres psql -U "$DB_USER_VALUE" -d "$DB_NAME_VALUE" -v ON_ERROR_STOP=1 -v db_user="$DB_USER_VALUE" -v db_password="$DB_PASSWORD_VALUE" <<'SQL'
          ALTER ROLE :"db_user" WITH PASSWORD :'db_password';
          SQL

          echo "--- Rebuilding backend with patched Dockerfile and DB config ---"
          docker compose --env-file .env -f infra/compose/docker-compose.prod.yml up -d --build --force-recreate backend
          sleep 8

          echo "--- Verifying backend DB env and pilot extension ---"
          docker exec -i -e PILOT_USER_ID="${PILOT_USER_ID:-1}" cp11-backend node --input-type=module - <<'NODE'
          import pg from 'pg';
          const pilotUserId = Number.parseInt(process.env.PILOT_USER_ID || '1', 10);
          const required = ['PG_HOST', 'PG_USER', 'PG_PASSWORD', 'PG_DATABASE'];
          const missing = required.filter((key) => !process.env[key]);
          if (missing.length) throw new Error(`Missing backend PG env: ${missing.join(', ')}`);
          console.log(`Backend PG env present: host=${process.env.PG_HOST}, user=${process.env.PG_USER}, database=${process.env.PG_DATABASE}, password=<set>`);
          const pool = new pg.Pool({
            host: process.env.PG_HOST,
            port: Number(process.env.PG_PORT || 5432),
            user: process.env.PG_USER,
            password: process.env.PG_PASSWORD,
            database: process.env.PG_DATABASE,
            ssl: false,
            connectionTimeoutMillis: 5000,
          });
          try {
            const auth = await pool.query('select current_user, current_database()');
            console.log(`Backend PG auth OK as ${auth.rows[0].current_user} on ${auth.rows[0].current_database}`);
            const ext = await pool.query(`
              SELECT e.extension_number, COALESCE(e.sip_domain, sa.sip_domain) AS sip_domain
              FROM extensions e
              LEFT JOIN user_extensions ue ON ue.extension_id = e.id AND ue.user_id = $1
              LEFT JOIN sip_accounts sa ON sa.extension_id = e.id AND sa.deleted_at IS NULL
              WHERE (ue.user_id = $1 OR e.user_id = $1 OR sa.user_id = $1)
                AND COALESCE(e.status, 'active') = 'active'
                AND e.deleted_at IS NULL
              ORDER BY ue.is_primary DESC NULLS LAST, e.id ASC
              LIMIT 1
            `, [pilotUserId]);
            if (!ext.rows.length) throw new Error(`No pilot extension found for user ${pilotUserId}`);
            console.log(`Pilot extension ready: ${ext.rows[0].extension_number} on ${ext.rows[0].sip_domain || 'sip.phone11.ai'}`);
          } finally {
            await pool.end();
          }
          NODE

          docker restart cp11-backend >/dev/null
          sleep 6
          curl -fsS http://127.0.0.1:3000/health
          echo ""
          echo "Redeploy finished."
          SCRIPT
          chmod +x /tmp/phone11-redeploy-mobile-branch.sh

      - name: Locate EC2 instance through AWS
        id: ec2
        run: |
          if [ -z "${AWS_ACCESS_KEY_ID:-}" ] || [ -z "${AWS_SECRET_ACCESS_KEY:-}" ]; then
            echo "ERROR: AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY must be configured."
            exit 30
          fi
          INSTANCE_JSON=$(aws ec2 describe-instances --filters "Name=ip-address,Values=$EC2_HOST" "Name=instance-state-name,Values=running" --query 'Reservations[0].Instances[0]' --output json)
          INSTANCE_ID=$(echo "$INSTANCE_JSON" | jq -r '.InstanceId // empty')
          AZ=$(echo "$INSTANCE_JSON" | jq -r '.Placement.AvailabilityZone // empty')
          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "null" ]; then
            echo "ERROR: Could not find a running EC2 instance with public IP $EC2_HOST"
            exit 31
          fi
          echo "instance_id=$INSTANCE_ID" >> "$GITHUB_OUTPUT"
          echo "az=$AZ" >> "$GITHUB_OUTPUT"
          echo "Found EC2 instance $INSTANCE_ID in $AZ"

      - name: Redeploy through EC2 Instance Connect
        id: deploy
        continue-on-error: true
        run: |
          set +e
          INSTANCE_ID='${{ steps.ec2.outputs.instance_id }}'
          AZ='${{ steps.ec2.outputs.az }}'
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keygen -t ed25519 -N '' -f ~/.ssh/phone11_temp_eic_key -C phone11-github-actions
          aws ec2-instance-connect send-ssh-public-key --instance-id "$INSTANCE_ID" --availability-zone "$AZ" --instance-os-user "$EC2_USER" --ssh-public-key "file://$HOME/.ssh/phone11_temp_eic_key.pub"
          scp -i ~/.ssh/phone11_temp_eic_key -o StrictHostKeyChecking=no /tmp/phone11-redeploy-mobile-branch.sh "$EC2_USER@$EC2_HOST:/tmp/"
          ssh -i ~/.ssh/phone11_temp_eic_key -o StrictHostKeyChecking=no "$EC2_USER@$EC2_HOST" "GITHUB_SHA='$GITHUB_SHA' DEPLOY_CHECKOUT='$DEPLOY_CHECKOUT' PILOT_USER_ID='$PILOT_USER_ID' bash /tmp/phone11-redeploy-mobile-branch.sh" 2>&1 | tee /tmp/phone11-redeploy-output.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit sanitized redeploy status
        if: always()
        run: |
          mkdir -p ops
          status='${{ steps.deploy.outputs.status }}'
          if [ -z "$status" ]; then status=99; fi
          result="success"
          if [ "$status" != "0" ]; then result="failure"; fi
          {
            echo "# Phone11 Mobile Branch Deploy Status"
            echo ""
            echo "- Time UTC: $(date -u -Iseconds)"
            echo "- Workflow commit: $GITHUB_SHA"
            echo "- Branch: $GITHUB_REF_NAME"
            echo "- EC2 host: $EC2_HOST"
            echo "- Pilot user id: $PILOT_USER_ID"
            echo "- Result: $result"
            echo "- Exit code: $status"
            echo ""
            echo "## Sanitized output"
            echo '```text'
            sed -E 's#(postgres://)[^:@/]+:[^@]+@#\1<redacted>:<redacted>@#g; s#(password authentication failed for user )"[^"]+"#\1"<db-user>"#g; s#(PGPASSWORD|DB_PASSWORD|AWS_SECRET_ACCESS_KEY|AWS_ACCESS_KEY_ID)=([^[:space:]]+)#\1=<redacted>#g' /tmp/phone11-redeploy-output.log 2>/dev/null || true
            echo '```'
          } > ops/phone11-mobile-branch-deploy-status.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ops/phone11-mobile-branch-deploy-status.md
          if git diff --cached --quiet; then
            echo "No status file changes to commit."
          else
            git commit -m "Update Phone11 mobile branch deploy status"
            git push
          fi

      - name: Fail if redeploy failed
        if: always()
        run: |
          status='${{ steps.deploy.outputs.status }}'
          if [ -z "$status" ]; then status=99; fi
          exit "$status"
