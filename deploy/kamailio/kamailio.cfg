#!KAMAILIO
# ============================================================================
# Kamailio SIP Proxy Configuration — CloudPhone11
# ============================================================================
#
# This configuration provides:
#   - SIP user registration (CloudPhone11 app users)
#   - Call routing to FreeSWITCH PBX
#   - NAT traversal for mobile clients
#   - TLS/SRTP encryption support
#   - WebSocket (WSS) support for web clients
#   - Anti-flood and security protections
#   - Integration with Dinstar SBC for PSTN breakout
#   - BillRun subscriber authentication
#
# Tested with Kamailio 5.7+
# ============================================================================

# ─── Global Parameters ──────────────────────────────────────────────────────

#!define WITH_MYSQL
#!define WITH_AUTH
#!define WITH_NAT
#!define WITH_TLS
#!define WITH_WEBSOCKETS
#!define WITH_ANTIFLOOD

# ─── Server Settings ────────────────────────────────────────────────────────

# Replace with your server's public IP
#!substdef "!MY_IP_ADDR!YOUR_SERVER_PUBLIC_IP!g"
#!substdef "!MY_DOMAIN!sip.yourcompany.com!g"
#!substdef "!MY_WS_DOMAIN!wss.yourcompany.com!g"

# FreeSWITCH PBX address
#!substdef "!FREESWITCH_IP!127.0.0.1!g"
#!substdef "!FREESWITCH_PORT!5080!g"

# Dinstar SBC address (for PSTN breakout)
#!substdef "!DINSTAR_IP!YOUR_DINSTAR_SBC_IP!g"
#!substdef "!DINSTAR_PORT!5060!g"

# BillRun API for subscriber auth
#!substdef "!BILLRUN_API!http://127.0.0.1:8080/billapi!g"

# ─── Listening Ports ────────────────────────────────────────────────────────

listen=udp:MY_IP_ADDR:5060
listen=tcp:MY_IP_ADDR:5060
listen=tls:MY_IP_ADDR:5061
listen=tcp:MY_IP_ADDR:8080  # WebSocket
listen=tls:MY_IP_ADDR:8443  # Secure WebSocket

# ─── Core Parameters ────────────────────────────────────────────────────────

fork=yes
children=8
auto_aliases=no
dns=no
rev_dns=no
tcp_connection_lifetime=3605
tcp_accept_no_cl=yes

# ─── Logging ─────────────────────────────────────────────────────────────────

debug=2
log_stderror=no
log_facility=LOG_LOCAL0
log_prefix="{$mt $hdr(CSeq) $ci} "

# ─── Module Loading ─────────────────────────────────────────────────────────

loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "textops.so"
loadmodule "textopsx.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "cfg_rpc.so"
loadmodule "jsonrpcs.so"
loadmodule "dispatcher.so"
loadmodule "nathelper.so"
loadmodule "rtpengine.so"
loadmodule "htable.so"
loadmodule "pike.so"
loadmodule "dialog.so"

#!ifdef WITH_AUTH
loadmodule "auth.so"
loadmodule "auth_db.so"
#!endif

#!ifdef WITH_MYSQL
loadmodule "db_mysql.so"
#!endif

#!ifdef WITH_TLS
loadmodule "tls.so"
#!endif

#!ifdef WITH_WEBSOCKETS
loadmodule "websocket.so"
loadmodule "xhttp.so"
#!endif

# ─── Module Parameters ──────────────────────────────────────────────────────

# MySQL connection (for subscriber registry)
#!ifdef WITH_MYSQL
modparam("auth_db", "db_url", "mysql://kamailio:kamailio_pass@localhost/kamailio")
modparam("usrloc", "db_url", "mysql://kamailio:kamailio_pass@localhost/kamailio")
modparam("usrloc", "db_mode", 2)
#!endif

# Registrar
modparam("registrar", "method_filtering", 1)
modparam("registrar", "max_expires", 3600)
modparam("registrar", "min_expires", 60)
modparam("registrar", "default_expires", 600)
modparam("registrar", "gruu_enabled", 0)

# Record Route
modparam("rr", "enable_full_lr", 0)
modparam("rr", "append_fromtag", 0)

# Transaction Module
modparam("tm", "failure_reply_mode", 3)
modparam("tm", "fr_timer", 30000)
modparam("tm", "fr_inv_timer", 120000)

# NAT Traversal
modparam("nathelper", "natping_interval", 30)
modparam("nathelper", "ping_nated_only", 1)
modparam("nathelper", "sipping_bflag", 7)
modparam("nathelper", "sipping_from", "sip:pinger@MY_DOMAIN")

# RTPEngine (media relay for NAT)
modparam("rtpengine", "rtpengine_sock", "udp:127.0.0.1:22222")

# Dispatcher (load balance to FreeSWITCH)
modparam("dispatcher", "db_url", "mysql://kamailio:kamailio_pass@localhost/kamailio")
modparam("dispatcher", "ds_ping_interval", 30)
modparam("dispatcher", "ds_probing_mode", 1)

# Anti-flood
modparam("pike", "sampling_time_unit", 2)
modparam("pike", "reqs_density_per_unit", 30)
modparam("pike", "remove_latency", 4)
modparam("htable", "htable", "ipban=>size=8;autoexpire=300;")

# Dialog tracking
modparam("dialog", "db_url", "mysql://kamailio:kamailio_pass@localhost/kamailio")
modparam("dialog", "enable_stats", 1)

#!ifdef WITH_TLS
modparam("tls", "config", "/etc/kamailio/tls.cfg")
#!endif

# ─── Request Routing Logic ──────────────────────────────────────────────────

request_route {
    # Per-request initial checks
    route(REQINIT);

    # NAT detection
    route(NATDETECT);

    # CANCEL processing
    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            route(RELAY);
        }
        exit;
    }

    # Handle retransmissions
    if (!is_method("ACK")) {
        if (t_precheck_trans()) {
            t_check_trans();
            exit;
        }
        t_check_trans();
    }

    # Record routing for dialog-forming requests
    if (is_method("INVITE|SUBSCRIBE")) {
        record_route();
    }

    # Handle requests within existing dialogs
    route(WITHINDLG);

    # ── Only initial requests past this point ──

    # Authentication
    if (is_method("REGISTER") || from_uri==myself) {
        route(AUTH);
    }

    # REGISTER handling
    if (is_method("REGISTER")) {
        route(REGISTRAR);
        exit;
    }

    if ($rU==$null) {
        sl_send_reply("484", "Address Incomplete");
        exit;
    }

    # Route to PSTN via Dinstar SBC if destination is external
    route(PSTN);

    # Route to local users
    route(LOCATION);
}

# ─── Sub-routes ──────────────────────────────────────────────────────────────

# Initial request checks
route[REQINIT] {
    # Anti-flood
    if (src_ip!=myself) {
        if ($sht(ipban=>$si)!=$null) {
            xdbg("request from blocked IP - $rm from $fu (IP:$si:$sp)\n");
            exit;
        }
        if (!pike_check_req()) {
            xlog("L_ALERT", "PIKE blocking $rm from $fu (IP:$si:$sp)\n");
            $sht(ipban=>$si) = 1;
            exit;
        }
    }

    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }

    if (is_method("OPTIONS") && uri==myself && $rU==$null) {
        sl_send_reply("200", "Keepalive");
        exit;
    }

    if (!sanity_check("17895", "7")) {
        xlog("L_WARN", "Malformed SIP request from $si:$sp\n");
        exit;
    }
}

# NAT detection
route[NATDETECT] {
    force_rport();
    if (nat_uac_test("19")) {
        if (is_method("REGISTER")) {
            fix_nated_register();
        } else {
            if (is_first_hop()) {
                set_contact_alias();
            }
        }
        setflag(5);  # NAT flag
    }
}

# NAT management for RTP
route[NATMANAGE] {
    if (is_request()) {
        if (has_totag()) {
            if (check_route_param("nat=yes")) {
                setbflag(5);
            }
        }
    }
    if (!(isflagset(5) || isbflagset(5))) {
        return;
    }
    # Use RTPEngine for media relay
    rtpengine_manage("replace-origin replace-session-connection");
    if (is_request()) {
        if (!has_totag()) {
            if (is_method("INVITE")) {
                add_rr_param(";nat=yes");
            }
        }
    }
    if (is_reply()) {
        if (isbflagset(5)) {
            fix_nated_contact();
        }
    }
}

# Authentication
route[AUTH] {
    if (is_method("REGISTER") || from_uri==myself) {
        if (!auth_check("MY_DOMAIN", "subscriber", "1")) {
            auth_challenge("MY_DOMAIN", "1");
            exit;
        }
        consume_credentials();
    }
}

# Registrar
route[REGISTRAR] {
    if (!save("location")) {
        sl_reply_error();
    }
    xlog("L_INFO", "REGISTER from $fu - Contact: $ct\n");
    exit;
}

# Within-dialog requests
route[WITHINDLG] {
    if (!has_totag()) return;

    if (loose_route()) {
        route(NATMANAGE);
        if (is_method("BYE")) {
            # Track call end for CDR
            xlog("L_INFO", "BYE from $fu to $tu - Call ended\n");
        }
        route(RELAY);
        exit;
    }

    if (is_method("ACK")) {
        if (t_check_trans()) {
            route(RELAY);
            exit;
        }
        exit;
    }

    sl_send_reply("404", "Not Here");
    exit;
}

# PSTN routing via Dinstar SBC
route[PSTN] {
    # Route calls to external numbers (E.164) via Dinstar SBC
    if ($rU =~ "^\+?[0-9]{7,15}$") {
        # Check if destination is not a local extension
        if (!lookup("location", "$rU")) {
            xlog("L_INFO", "PSTN call from $fu to $rU via Dinstar SBC\n");
            $du = "sip:DINSTAR_IP:DINSTAR_PORT";
            route(RELAY);
            exit;
        }
    }
}

# Location lookup for local users
route[LOCATION] {
    if (!lookup("location")) {
        # User not registered — try FreeSWITCH (voicemail, IVR, etc.)
        $du = "sip:FREESWITCH_IP:FREESWITCH_PORT";
        route(RELAY);
        exit;
    }

    # User found — route to their registered device
    route(NATMANAGE);
    t_on_failure("FAIL_ROUTE");
    route(RELAY);
    exit;
}

# Relay
route[RELAY] {
    if (is_method("INVITE")) {
        if (!t_is_set("failure_route")) {
            t_on_failure("FAIL_ROUTE");
        }
    }
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

# Failure route — if user doesn't answer, send to voicemail via FreeSWITCH
failure_route[FAIL_ROUTE] {
    if (t_is_canceled()) exit;

    if (t_check_status("486|408|480")) {
        xlog("L_INFO", "Call to $rU failed ($T_reply_code) — routing to voicemail\n");
        # Route to FreeSWITCH voicemail
        $du = "sip:FREESWITCH_IP:FREESWITCH_PORT";
        $ru = "sip:voicemail-" + $rU + "@MY_DOMAIN";
        t_relay();
        exit;
    }
}

# ─── WebSocket Handling ─────────────────────────────────────────────────────

#!ifdef WITH_WEBSOCKETS
event_route[xhttp:request] {
    if ($hdr(Upgrade)=~"websocket" && $hdr(Connection)=~"Upgrade") {
        if (ws_handle_handshake()) {
            exit;
        }
    }
    xhttp_reply("200", "OK", "text/html", "<html><body>CloudPhone11 SIP Proxy</body></html>");
}
#!endif
