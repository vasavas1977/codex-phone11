# ============================================================================
# Kamailio TLS Configuration — Phone11.ai
# Let's Encrypt certificates for sip.phone11.ai
# ============================================================================

[server:default]
method = TLSv1.2+
verify_certificate = no
require_certificate = no
private_key = /etc/kamailio/tls/server.key
certificate = /etc/kamailio/tls/server.crt
ca_list = /etc/kamailio/tls/ca.crt

[client:default]
method = TLSv1.2+
verify_certificate = no
require_certificate = no
