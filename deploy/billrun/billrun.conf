; ============================================================================
; BillRun Configuration — CloudPhone11 Telecom Operator
; ============================================================================
;
; This configuration sets up BillRun for converged billing:
;   - VoIP voice (per-second CDR rating)
;   - DID number rental (monthly recurring)
;   - SMS messaging (per-message)
;   - MVNO SIM (Diameter Gy/Ro)
;   - Hosted PBX (per-extension)
;
; Place this file at /etc/billrun/billrun.conf inside the BillRun container.
; ============================================================================

[billrun]
name = "cloudphone11"
version = "5.0"
currency = "USD"
timezone = "UTC"
loglevel = "info"

; ─── Database ────────────────────────────────────────────────────────────────
[db]
host = "mongodb"
port = 27017
name = "billrun"
user = "billrun"
password = "CHANGE_ME_DB_PASSWORD"

; ─── API Configuration ───────────────────────────────────────────────────────
[api]
enabled = true
port = 80
; API authentication key — use this in CloudPhone11 app
api_key = "CHANGE_ME_API_KEY"
; CORS — allow CloudPhone11 app to call the API
cors_origins = "*"
; Rate limiting
rate_limit = 1000
rate_limit_period = 60

; ─── CDR Mediation ───────────────────────────────────────────────────────────
; Receives CDRs from FreeSWITCH via HTTP POST
[cdr]
receiver_enabled = true
receiver_port = 8082
; CDR format from FreeSWITCH
format = "freeswitch_json"
; Fields to extract from FreeSWITCH CDR
fields = "caller_id_number,destination_number,billsec,start_stamp,end_stamp,hangup_cause,direction,uuid"
; Real-time rating — rate CDRs as they arrive
realtime_rating = true

; ─── Rating Engine ───────────────────────────────────────────────────────────
[rating]
; Voice rating
voice_unit = "second"
voice_min_duration = 0
voice_rounding = 1
; SMS rating
sms_unit = "message"
; DID rating
did_unit = "month"
did_prorate = true
; Data rating (for MVNO SIM)
data_unit = "KB"

; ─── Billing Cycles ─────────────────────────────────────────────────────────
[billing]
cycle_type = "monthly"
cycle_day = 1
; Invoice generation
auto_invoice = true
invoice_template = "cloudphone11_invoice"
; Payment terms
payment_due_days = 30
; Auto-charge
auto_charge = false

; ─── Prepaid / Real-Time OCS ────────────────────────────────────────────────
[prepaid]
enabled = true
; Diameter interface for MVNO SIM charging
diameter_enabled = true
diameter_port = 3868
; Balance check before call connect
balance_check = true
; Low balance threshold (send notification)
low_balance_threshold = 5.00

; ─── Notifications ──────────────────────────────────────────────────────────
[notifications]
; Low balance alert
low_balance_enabled = true
; Invoice ready notification
invoice_ready_enabled = true
; Payment received confirmation
payment_received_enabled = true

; ─── Customer Portal ────────────────────────────────────────────────────────
[portal]
enabled = true
; Self-service features
allow_plan_change = true
allow_payment = true
allow_usage_view = true
allow_invoice_download = true

; ─── FreeSWITCH Integration ─────────────────────────────────────────────────
[freeswitch]
; ESL connection for real-time balance check during calls
esl_host = "freeswitch"
esl_port = 8021
esl_password = "CHANGE_ME_ESL_PASSWORD"
; CDR push URL (FreeSWITCH sends CDRs here)
cdr_url = "http://cdr-receiver:8082/cdr"

; ─── Kamailio Integration ───────────────────────────────────────────────────
[kamailio]
; Kamailio uses BillRun API for subscriber authentication
auth_url = "http://billrun:80/billapi/subscribers"
; Real-time balance check for prepaid
balance_url = "http://billrun:80/billapi/balances"
