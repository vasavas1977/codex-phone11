---
# =============================================================================
# Ingress — Backend API + WSS (via nginx-ingress or ALB)
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudphone11-ingress
  namespace: cloudphone11
  labels:
    app.kubernetes.io/name: cloudphone11
  annotations:
    # nginx-ingress
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # WebSocket support for SIP over WSS
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    # cert-manager for automatic TLS
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.cloudphone11.io
        - wss.cloudphone11.io
      secretName: cloudphone11-web-tls
  rules:
    # Backend API
    - host: api.cloudphone11.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 3000
    # WebSocket SIP (WSS) via Kamailio
    - host: wss.cloudphone11.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kamailio
                port:
                  number: 7443
---
# =============================================================================
# HPA — Backend API autoscaling
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: cloudphone11
  labels:
    app.kubernetes.io/name: backend
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
# =============================================================================
# HPA — Kamailio autoscaling
# =============================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kamailio-hpa
  namespace: cloudphone11
  labels:
    app.kubernetes.io/name: kamailio
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kamailio
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
---
# =============================================================================
# PodDisruptionBudget — Kamailio (ensure SIP availability during rollouts)
# =============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: kamailio-pdb
  namespace: cloudphone11
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kamailio
---
# =============================================================================
# PodDisruptionBudget — Backend API
# =============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: cloudphone11
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
