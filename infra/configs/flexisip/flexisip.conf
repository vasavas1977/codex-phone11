# =============================================================================
# CloudPhone11 — Flexisip Push Gateway Configuration
# =============================================================================
# Role: Receives SIP INVITEs for offline users from Kamailio and sends
#       push notifications via FCM (Android) and APNs (iOS) to wake devices.
# =============================================================================

[global]
debug=false
log-level=message
syslog=false
auto-respawn=true
transports=sip:__SIP_DOMAIN__:5065;transport=udp sip:__SIP_DOMAIN__:5065;transport=tcp

[module::DoSProtection]
enabled=true
time-period=10
packet-rate-limit=100
ban-duration=600

[module::Registrar]
enabled=true
reg-domains=__SIP_DOMAIN__
# Store registrations in Redis for HA
db-implementation=redis
redis-server-domain=redis
redis-server-port=6379
redis-auth-password=__REDIS_PASSWORD__

[module::Router]
enabled=true
# Forward to Kamailio for registered users, push for unregistered
use-global-domain=false

[module::PushNotification]
enabled=true
# Maximum time to wait for device to wake up and register
timeout=20
# Maximum retries for push delivery
max-queue-size=100
# Remove old push tokens after 30 days of inactivity
apple-push-token-expiration=2592000
# Display caller info in push notification
display-from-uri=true

# --- Firebase Cloud Messaging (Android) ---
[module::PushNotification::firebase]
# FCM HTTP v1 API project ID
project-id=cloudphone11
# Service account key file for FCM v1 API
service-account-file=/etc/flexisip/apns/firebase-service-account.json
# Legacy server key (fallback)
api-key=__FCM_API_KEY__

# --- Apple Push Notification Service (iOS) ---
[module::PushNotification::apple]
enabled=true
# APNs certificate (.pem) for push notifications
cert-file=__APNS_CERT_PATH__
# Use production APNs (set to false for sandbox/development)
is-production=true
# Bundle ID must match the iOS app
bundle-id=space.manus.cloudphone11

# --- Push notification content templates ---
[module::PushNotification::call]
# Template for incoming call push
title-pattern=Incoming Call
body-pattern=Call from %from_name% (%from_sip%)
sound=default
# VoIP push for iOS (wakes app immediately)
use-voip-push=true

[module::PushNotification::message]
title-pattern=New Message
body-pattern=Message from %from_name%
sound=default

# --- Presence forwarding ---
[module::Presence]
enabled=true
# Forward presence SUBSCRIBE/NOTIFY to Kamailio
presence-server=sip:__KAMAILIO_HOST__:5060;transport=udp

# --- TLS ---
[tls]
certificates-dir=/etc/flexisip/tls
certificates-private-key=privkey.pem
certificates-certificate=fullchain.pem
